<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Management Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Server Management Dashboard</h1>
    </header>
    <main>
        <section id="server-status">
            <h2>Server Status</h2>
            <p>Server is running smoothly.</p>
        </section>
        <section id="server-stats">
            <h2>Statistics</h2>
            <ul>
                <li>Online Players: 10</li>
                <li>Max Players: 100</li>
                <li>Uptime: 24 hours</li>
            </ul>
        </section>
        <section id="settings">
            <h2>Server Settings</h2>
            <button onclick="reloadConfig()">Reload Configuration</button>
            <button onclick="restartServer()">Restart Server</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Server Management</p>
    </footer>
</body>
</html>
