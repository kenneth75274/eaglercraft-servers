<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Chat Forum</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        #chat, #forum { margin: 20px; padding: 10px; border: 1px solid #ccc; }\n        #messages, #posts { list-style-type: none; padding: 0; }\n        li { margin: 5px 0; }\n    </style>\n</head>\n<body>\n    <h1>Welcome to the Chat and Forum</h1>\n    <div id="chat">\n        <h2>Chat Room</h2>\n        <ul id="messages"></ul>\n        <input id="chatInput" type="text" placeholder="Type a message...">\n        <button onclick="sendMessage()">Send</button>\n    </div>\n    <div id="forum">\n        <h2>Forum Posts</h2>\n        <ul id="posts"></ul>\n        <input id="forumInput" type="text" placeholder="Write a post..."><button onclick="submitPost()">Post</button>\n    </div>\n    <script>\n        function sendMessage() {\n            const input = document.getElementById('chatInput');\n            const message = input.value;\n            const messagesList = document.getElementById('messages');\n            const li = document.createElement('li');\n            li.textContent = message;\n            messagesList.appendChild(li);\n            input.value = '';\n        }\n        function submitPost() {\n            const input = document.getElementById('forumInput');\n            const post = input.value;\n            const postsList = document.getElementById('posts');\n            const li = document.createElement('li');\n            li.textContent = post;\n            postsList.appendChild(li);\n            input.value = '';\n        }\n    </script>\n</body>\n</html>
