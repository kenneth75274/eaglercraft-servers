<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .card { border: 1px solid #ccc; padding: 16px; margin: 8px; display: inline-block; width: 200px; }
        .card img { width: 100%; }
    </style>
</head>
<body>
    <h1>Free Spawn Worlds Marketplace</h1>
    <div class="card">
        <img src="world1.jpg" alt="World 1">
        <h2>World Name 1</h2>
        <p>Creator: Creator 1</p>
        <p>Rating: ★★★★☆</p>
        <p>Players: 100</p>
        <button>View</button>
    </div>
    <div class="card">
        <img src="world2.jpg" alt="World 2">
        <h2>World Name 2</h2>
        <p>Creator: Creator 2</p>
        <p>Rating: ★★★☆☆</p>
        <p>Players: 50</p>
        <button>View</button>
    </div>
    <!-- Additional world cards can be added here -->
</body>
</html>
