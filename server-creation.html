<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Creation Form</title>
</head>
<body>
    <h1>Create Your Server</h1>
    <form action="/submit-server" method="post">
        <label for="serverName">Server Name:</label>
        <input type="text" id="serverName" name="serverName" required><br><br>

        <label for="serverType">Server Type:</label>
        <select id="serverType" name="serverType">
            <option value="Minecraft">Minecraft</option>
            <option value="Counter-Strike">Counter-Strike</option>
            <option value="Team Fortress">Team Fortress</option>
        </select><br><br>

        <label for="maxPlayers">Max Players:</label>
        <input type="number" id="maxPlayers" name="maxPlayers" min="1" required><br><br>

        <input type="submit" value="Create Server">
    </form>
</body>
</html>
